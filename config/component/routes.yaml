bridging_interfacing_catalog_index:
    path: /catalog/
    controller: App\Bridging\Controller\Interfacing\BridgeVisibleProviderSurfaceController::show
    defaults:
        prefix: catalog
        resourcePath: catalog
    methods: [GET]

bridging_interfacing_catalog_resource:
    path: /catalog/{resourcePath}
    controller: App\Bridging\Controller\Interfacing\BridgeVisibleProviderSurfaceController::show
    defaults:
        prefix: catalog
    requirements:
        resourcePath: '.+'
    methods: [GET]

